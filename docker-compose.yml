name: gps-data-receiver

# Default registry mirror for environments with limited Docker Hub / GCR access (e.g. Iran).
# Override in .env: DOCKER_REGISTRY=docker.io

x-app-build: &app-build
  context: .
  dockerfile: Dockerfile
  args:
    DOCKER_REGISTRY: ${DOCKER_REGISTRY:-docker.arvancloud.ir}
    NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 10s

services:
  # Redis primary (durable ingest target for Zero-Drop XADD).
  redis:
    image: ${DOCKER_REGISTRY:-docker.arvancloud.ir}/redis:7.4-alpine
    container_name: gps-redis
    pull_policy: if_not_present
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "/etc/redis/redis.conf"]
    volumes:
      - redis-data:/data
      - ./docker/redis/redis-primary.conf:/etc/redis/redis.conf:ro
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - gps-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M

  # Redis replica — promoted by Sentinel on primary failure.
  redis-replica:
    image: ${DOCKER_REGISTRY:-docker.arvancloud.ir}/redis:7.4-alpine
    container_name: gps-redis-replica
    pull_policy: if_not_present
    ports:
      - "127.0.0.1:6380:6379"
    command: ["redis-server", "/etc/redis/redis.conf"]
    volumes:
      - redis-replica-data:/data
      - ./docker/redis/redis-replica.conf:/etc/redis/redis.conf:ro
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - gps-network
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M

  # Sentinel quorum (3 nodes) for automatic failover. App connects via Sentinels.
  redis-sentinel-1: &redis-sentinel
    image: ${DOCKER_REGISTRY:-docker.arvancloud.ir}/redis:7.4-alpine
    container_name: gps-redis-sentinel-1
    hostname: redis-sentinel-1
    pull_policy: if_not_present
    command:
      - sh
      - -c
      - |
        cp /etc/redis/sentinel.conf /tmp/sentinel.conf
        echo 'sentinel announce-ip redis-sentinel-1' >> /tmp/sentinel.conf
        echo 'sentinel announce-port 26379' >> /tmp/sentinel.conf
        redis-sentinel /tmp/sentinel.conf
    volumes:
      - ./docker/redis/sentinel.conf:/etc/redis/sentinel.conf:ro
    networks:
      - gps-network
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis-sentinel-2:
    <<: *redis-sentinel
    container_name: gps-redis-sentinel-2
    hostname: redis-sentinel-2
    command:
      - sh
      - -c
      - |
        cp /etc/redis/sentinel.conf /tmp/sentinel.conf
        echo 'sentinel announce-ip redis-sentinel-2' >> /tmp/sentinel.conf
        echo 'sentinel announce-port 26379' >> /tmp/sentinel.conf
        redis-sentinel /tmp/sentinel.conf

  redis-sentinel-3:
    <<: *redis-sentinel
    container_name: gps-redis-sentinel-3
    hostname: redis-sentinel-3
    command:
      - sh
      - -c
      - |
        cp /etc/redis/sentinel.conf /tmp/sentinel.conf
        echo 'sentinel announce-ip redis-sentinel-3' >> /tmp/sentinel.conf
        echo 'sentinel announce-port 26379' >> /tmp/sentinel.conf
        redis-sentinel /tmp/sentinel.conf

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: gps-postgres
    pull_policy: if_not_present
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: gps
      POSTGRES_PASSWORD: gps
      POSTGRES_DB: gps_receiver
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - gps-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gps -d gps_receiver"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      <<: *app-build
    image: gps-receiver:latest
    develop:
      watch:
        - action: rebuild
          path: ./cmd
        - action: rebuild
          path: ./internal
        - action: rebuild
          path: ./pkg
        - action: rebuild
          path: ./web
        - action: rebuild
          path: go.mod
        - action: rebuild
          path: go.sum
    container_name: gps-receiver
    init: true
    pull_policy: build
    stop_grace_period: 90s
    ports:
      - "8080:8080"
      - "5055:5055"
    env_file:
      - .env
    environment:
      SERVER_PORT: "8080"
      SERVER_HOST: "0.0.0.0"
      REQUEST_TIMEOUT: "5s"
      MAX_REQUEST_SIZE: "1048576"
      DESTINATION_SERVERS: ${DESTINATION_SERVERS}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      # Prefer Sentinel HA when available (failover without app restart).
      REDIS_SENTINEL_MASTER: mymaster
      REDIS_SENTINEL_ADDRS: redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      REDIS_STREAM_NAME: gps:reports
      REDIS_CONSUMER_GROUP: gps-workers
      REDIS_MAX_LEN: "10000"
      REDIS_RAW_STREAM: gps:raw_incoming
      REDIS_RAW_CONSUMER_GROUP: gps-raw-workers
      REDIS_RAW_MAX_LEN: "0"
      REDIS_DEAD_LETTER_STREAM: gps:dead_letter
      REDIS_HOOSHNICS_RETRY_STREAM: gps:hooshnics_retry
      REDIS_PISTAT_RETRY_STREAM: gps:pistat_retry
      REDIS_DEDUPE_TTL: 24h
      WORKER_COUNT: "50"
      WORKER_BATCH_SIZE: "50"
      MAX_RETRY_ATTEMPTS: "3"
      RETRY_DELAY_FIRST: "1s"
      RETRY_DELAY_SUBSEQUENT: "2s"
      HTTP_CLIENT_TIMEOUT: "15s"
      HTTP_CLIENT_MAX_IDLE_CONNS: "200"
      HTTP_CLIENT_MAX_CONNS_PER_HOST: "60"
      REDIS_POOL_SIZE: "300"
      RATE_LIMIT_REQUESTS_PER_SECOND: "1000"
      RATE_LIMIT_BURST: "2000"
      LOG_LEVEL: info
      LOG_FORMAT: json
      # Local Compose is a lab environment (not public production).
      ENVIRONMENT: development
      GPS_LAB_MODE: "true"
      POSTGRES_ENABLED: "true"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: gps
      POSTGRES_PASSWORD: gps
      POSTGRES_DB: gps_receiver
      POSTGRES_SSLMODE: disable
      TELTONIKA_TCP_ENABLED: "true"
      TELTONIKA_TCP_HOST: "0.0.0.0"
      TELTONIKA_TCP_PORT: "5055"
      TELTONIKA_TIMEZONE_OFFSET: "3h30m"
      ARCHIVE_ENABLED: "true"
      ARCHIVE_DIR: /var/lib/gps-archive
      ARCHIVE_STRICT: "false"
      # Do not set user: "1000:1000" here — entrypoint must start as root to chown the archive volume, then drops to appuser.
    volumes:
      - archive-data:/var/lib/gps-archive
    depends_on:
      redis:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_healthy
      redis-sentinel-2:
        condition: service_healthy
      redis-sentinel-3:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - gps-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  node-exporter:
    image: ${DOCKER_REGISTRY:-docker.arvancloud.ir}/prom/node-exporter:v1.9.1
    container_name: gps-node-exporter
    pull_policy: if_not_present
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /run/udev:/run/udev:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    networks:
      - gps-network
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9100/"]
      interval: 30s
      timeout: 5s
      retries: 3

  cadvisor:
    image: ${CADVISOR_IMAGE:-${DOCKER_REGISTRY:-docker.arvancloud.ir}/dockette/cadvisor:0.56.2}
    container_name: gps-cadvisor
    pull_policy: if_not_present
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true
    command:
      - --housekeeping_interval=30s
      - --docker_only=true
    networks:
      - gps-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  prometheus:
    image: ${DOCKER_REGISTRY:-docker.arvancloud.ir}/prom/prometheus:v3.4.2
    container_name: gps-prometheus
    pull_policy: if_not_present
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    networks:
      - gps-network
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
      node-exporter:
        condition: service_healthy
      cadvisor:
        condition: service_healthy
      redis-exporter:
        condition: service_started
      alertmanager:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9090/-/healthy"]
      <<: *healthcheck-defaults

  redis-exporter:
    image: ${DOCKER_REGISTRY:-docker.arvancloud.ir}/oliver006/redis_exporter:v1.67.0
    container_name: gps-redis-exporter
    pull_policy: if_not_present
    environment:
      REDIS_ADDR: redis://redis:6379
    networks:
      - gps-network
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:9121:9121"
    security_opt:
      - no-new-privileges:true

  alertmanager:
    image: ${DOCKER_REGISTRY:-docker.arvancloud.ir}/prom/alertmanager:v0.28.1
    container_name: gps-alertmanager
    pull_policy: if_not_present
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    networks:
      - gps-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  grafana:
    image: ${DOCKER_REGISTRY:-docker.arvancloud.ir}/grafana/grafana:11.6.1
    container_name: gps-grafana
    pull_policy: if_not_present
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_SERVER_ROOT_URL:-http://localhost:3000}
      GF_SERVER_DOMAIN: ${GRAFANA_SERVER_DOMAIN:-localhost}
      GF_SERVER_PROTOCOL: ${GRAFANA_SERVER_PROTOCOL:-http}
      # Hostnames only (space-separated), not full URLs — Grafana compares Origin hostname to this list.
      # Defaults include GRAFANA_SERVER_DOMAIN so public domains work without a separate CSRF list.
      GF_SECURITY_CSRF_TRUSTED_ORIGINS: ${GRAFANA_CSRF_TRUSTED_ORIGINS:-${GRAFANA_SERVER_DOMAIN:-localhost} localhost 127.0.0.1}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - gps-network
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    healthcheck:
      # Respect GF_SERVER_PROTOCOL: production sets https while the default is http.
      test:
        [
          "CMD-SHELL",
          'if [ "$$GF_SERVER_PROTOCOL" = "https" ]; then wget -q --no-check-certificate -O /dev/null https://127.0.0.1:3000/api/health; else wget -q -O /dev/null http://127.0.0.1:3000/api/health; fi || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  gps-network:
    driver: bridge

volumes:
  redis-data:
  redis-replica-data:
  postgres-data:
  prometheus-data:
  grafana-data:
  archive-data:
