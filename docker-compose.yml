name: gps-data-receiver

# Default registry mirror for environments with limited Docker Hub / GCR access (e.g. Iran).
# Override in .env: DOCKER_REGISTRY=docker.io

x-app-build: &app-build
  context: .
  dockerfile: Dockerfile
  args:
    DOCKER_REGISTRY: ${DOCKER_REGISTRY:-docker.arvancloud.ir}
    NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 10s

services:
  redis:
    image: ${DOCKER_REGISTRY:-docker.arvancloud.ir}/redis:7.4-alpine
    container_name: gps-redis
    pull_policy: if_not_present
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - gps-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: gps-postgres
    pull_policy: if_not_present
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: gps
      POSTGRES_PASSWORD: gps
      POSTGRES_DB: gps_receiver
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - gps-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gps -d gps_receiver"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      <<: *app-build
    image: gps-receiver:latest
    develop:
      watch:
        - action: rebuild
          path: ./cmd
        - action: rebuild
          path: ./internal
        - action: rebuild
          path: ./pkg
        - action: rebuild
          path: ./web
        - action: rebuild
          path: go.mod
        - action: rebuild
          path: go.sum
    container_name: gps-receiver
    init: true
    pull_policy: build
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SERVER_PORT: "8080"
      SERVER_HOST: "0.0.0.0"
      REQUEST_TIMEOUT: "5s"
      MAX_REQUEST_SIZE: "1048576"
      DESTINATION_SERVERS: ${DESTINATION_SERVERS}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      REDIS_STREAM_NAME: gps:reports
      REDIS_CONSUMER_GROUP: gps-workers
      REDIS_MAX_LEN: "10000"
      WORKER_COUNT: "50"
      WORKER_BATCH_SIZE: "50"
      MAX_RETRY_ATTEMPTS: "3"
      RETRY_DELAY_FIRST: "1s"
      RETRY_DELAY_SUBSEQUENT: "2s"
      HTTP_CLIENT_TIMEOUT: "15s"
      HTTP_CLIENT_MAX_IDLE_CONNS: "200"
      HTTP_CLIENT_MAX_CONNS_PER_HOST: "60"
      REDIS_POOL_SIZE: "200"
      RATE_LIMIT_REQUESTS_PER_SECOND: "1000"
      RATE_LIMIT_BURST: "2000"
      LOG_LEVEL: info
      LOG_FORMAT: json
      ENVIRONMENT: production
      POSTGRES_ENABLED: "true"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: gps
      POSTGRES_PASSWORD: gps
      POSTGRES_DB: gps_receiver
      POSTGRES_SSLMODE: disable
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - gps-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  node-exporter:
    image: ${DOCKER_REGISTRY:-docker.arvancloud.ir}/prom/node-exporter:v1.9.1
    container_name: gps-node-exporter
    pull_policy: if_not_present
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    networks:
      - gps-network
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9100/"]
      interval: 30s
      timeout: 5s
      retries: 3

  cadvisor:
    image: ${CADVISOR_IMAGE:-${DOCKER_REGISTRY:-docker.arvancloud.ir}/dockette/cadvisor:0.56.2}
    container_name: gps-cadvisor
    pull_policy: if_not_present
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true
    command:
      - --housekeeping_interval=30s
      - --docker_only=true
    networks:
      - gps-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  prometheus:
    image: ${DOCKER_REGISTRY:-docker.arvancloud.ir}/prom/prometheus:v3.4.2
    container_name: gps-prometheus
    pull_policy: if_not_present
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    networks:
      - gps-network
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
      node-exporter:
        condition: service_healthy
      cadvisor:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9090/-/healthy"]
      <<: *healthcheck-defaults

  grafana:
    image: ${DOCKER_REGISTRY:-docker.arvancloud.ir}/grafana/grafana:11.6.1
    container_name: gps-grafana
    pull_policy: if_not_present
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_SERVER_ROOT_URL:-http://localhost:3000}
      GF_SERVER_DOMAIN: ${GRAFANA_SERVER_DOMAIN:-localhost}
      GF_SERVER_PROTOCOL: ${GRAFANA_SERVER_PROTOCOL:-http}
      # Hostnames only (space-separated), not full URLs — Grafana compares Origin hostname to this list.
      # Defaults include GRAFANA_SERVER_DOMAIN so public domains work without a separate CSRF list.
      GF_SECURITY_CSRF_TRUSTED_ORIGINS: ${GRAFANA_CSRF_TRUSTED_ORIGINS:-${GRAFANA_SERVER_DOMAIN:-localhost} localhost 127.0.0.1}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - gps-network
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      <<: *healthcheck-defaults

networks:
  gps-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
  prometheus-data:
  grafana-data:
