# Redis primary — Zero-Drop durable settings
# Used by docker-compose redis (master) service.
port 6379
bind 0.0.0.0
protected-mode no
appendonly yes
appendfsync everysec
maxmemory 512mb
maxmemory-policy noeviction
maxclients 10000
tcp-keepalive 60
# Announce hostname so Sentinel/replicas resolve correctly inside Compose DNS.
replica-announce-ip redis
replica-announce-port 6379
