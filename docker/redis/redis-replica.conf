# Redis replica — replicates primary for Sentinel failover.
port 6379
bind 0.0.0.0
protected-mode no
appendonly yes
appendfsync everysec
maxmemory 512mb
maxmemory-policy noeviction
maxclients 10000
tcp-keepalive 60
replicaof redis 6379
replica-read-only yes
replica-announce-ip redis-replica
replica-announce-port 6379
